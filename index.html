<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc Testnet Leaderboard & Wallet Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(to bottom, #0f172a, #020617); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-slate-950 to-black text-white">
  <header class="bg-slate-900/80 border-b border-slate-700 sticky top-0">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <!-- Arc Logo (placeholder - replace if you have better URL) -->
        <img src="https://via.placeholder.com/48/3b82f6/ffffff?text=Arc" alt="Arc Testnet" class="rounded-full">
        <h1 class="text-2xl font-bold">Arc Testnet Leaderboard</h1>
      </div>
      <p class="text-slate-400">Live on Testnet</p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">
    <section class="mb-12 text-center">
      <h2 class="text-3xl font-bold mb-4">Wallet Checker</h2>
      <p class="text-slate-400 mb-6">Enter your wallet address to view stats on Arc Testnet.</p>
      <div class="max-w-xl mx-auto bg-slate-800/50 border border-slate-700 rounded-2xl p-6">
        <div class="flex flex-col sm:flex-row gap-4">
          <input id="walletInput" type="text" placeholder="0x..." class="flex-1 bg-slate-900 border border-slate-600 rounded-xl px-5 py-3 focus:outline-none focus:border-blue-500">
          <button onclick="checkWallet()" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-xl font-semibold">Check</button>
        </div>
        <div id="result" class="mt-6"></div>
      </div>
    </section>

    <section>
      <h2 class="text-3xl font-bold text-center mb-6">Top 10 Active Wallets</h2>
      <div class="overflow-x-auto bg-slate-800/50 border border-slate-700 rounded-2xl">
        <table class="w-full">
          <thead class="bg-slate-900">
            <tr>
              <th class="p-4 text-left">Rank</th>
              <th class="p-4 text-left">Address</th>
              <th class="p-4 text-right">Tx Count</th>
            </tr>
          </thead>
          <tbody id="leaderboard"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const top10 = [
      { rank: 1, wallet: "0x360000...000000", tx: 11 },
      { rank: 2, wallet: "0xff5cb2...a6e8d1", tx: 12 },
      { rank: 3, wallet: "0xf3bf07...35b9d3", tx: 5 },
      { rank: 4, wallet: "0x2d84d7...add457", tx: 4 },
      { rank: 5, wallet: "0x737422...141023", tx: 4 },
      { rank: 6, wallet: "0x2d7863...1d59c2", tx: 3 },
      { rank: 7, wallet: "0xa3d9fb...f468a2", tx: 3 },
      { rank: 8, wallet: "0xbf4479...94275f", tx: 3 },
      { rank: 9, wallet: "0x65a860...8bfd98", tx: 2 },
      { rank: 10, wallet: "0x363cc7...e7ba43", tx: 2 }
    ];  // Update from live site if changed

    function renderTable() {
      const tbody = document.getElementById('leaderboard');
      tbody.innerHTML = '';
      top10.forEach(item => {
        tbody.innerHTML += `<tr class="border-t border-slate-700 hover:bg-slate-700/50">
          <td class="p-4 font-bold text-blue-400">#${item.rank}</td>
          <td class="p-4 font-mono">${item.wallet}</td>
          <td class="p-4 text-right">${item.tx}</td>
        </tr>`;
      });
    }

    async function checkWallet() {
      const input = document.getElementById('walletInput').value.trim();
      const result = document.getElementById('result');
      if (!input.startsWith('0x') || input.length !== 42) {
        result.innerHTML = '<p class="text-red-500">Invalid address</p>';
        return;
      }
      result.innerHTML = '<p class="text-yellow-500">Loading...</p>';
      // Your full checkWallet logic here (from previous messages - balance, first/last tx, explorer link for total tx)
      // Example placeholder
      result.innerHTML = '<p class="text-green-400">Wallet: ' + input + '<br>Details loading... (add your full code)</p>';
    }

    renderTable();
  </script>
</body>
</html>
