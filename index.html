<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARC Early Wallet Checker</title>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #00ff9d; font-size: 28px; margin-bottom: 10px; }
        .card { background: #111; padding: 30px; border-radius: 16px; margin: 20px 0; border: 1px solid #00ff9d; }
        input { width: 90%; padding: 18px; font-size: 17px; background: #222; color: white; border: 2px solid #00ff9d; border-radius: 12px; margin: 15px 0; }
        button { padding: 16px 40px; background: #00ff9d; color: black; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 25px; padding: 20px; background: #1a1a1a; border-radius: 12px; font-size: 20px; line-height: 1.6; }
        .big-num { font-size: 42px; color: #00ff9d; font-weight: bold; }
        .rank { font-size: 18px; color: #ffcc00; }
        .date { font-size: 16px; color: #aaa; }
        .note { font-size: 14px; color: #888; margin-top: 15px; }
        a { color: #00ff9d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 VARC Early Wallet Checker</h1>
        <p style="color:#00ff9d;">Arc Testnet • Tx Count, Balance, First/Last Tx + Rank</p>

        <div class="card">
            <input type="text" id="walletInput" placeholder="0xYourWalletAddress... (42 characters)">
            <br>
            <button onclick="checkWallet()">Check Stats</button>
        </div>

        <div id="result"></div>

        <p class="note">Made by @vijayranga43 • Real data from Arc Testnet Explorer</p>
    </div>

    <script>
    async function checkWallet() {
      const address = document.getElementById('walletInput').value.trim();
      const resultDiv = document.getElementById('result');
      
      if (!address || !address.startsWith('0x') || address.length !== 42) {
        resultDiv.innerHTML = '<span style="color: #ff5555;">Galat address! 0x se shuru aur exactly 42 characters daal.</span>';
        return;
      }

      resultDiv.innerHTML = 'Fetching wallet stats from Arc Testnet... ⏳';

      try {
        // Balance fetch
        const balanceRes = await fetch(`https://testnet.arcscan.app/api?module=account&action=balance&address=${address}`);
        const balanceData = await balanceRes.json();
        let balance = '0';
        if (balanceData.status === "1") {
          balance = (parseInt(balanceData.result) / 1e18).toFixed(6) + ' ETH';  // wei to ETH (Arc pe USDC bhi, lekin base balance ETH-like)
        }

        // Tx list for count, first & last tx
        const txAscRes = await fetch(`https://testnet.arcscan.app/api?module=account&action=txlist&address=${address}&page=1&offset=10000&sort=asc`);
        const txAscData = await txAscRes.json();
        const txDescRes = await fetch(`https://testnet.arcscan.app/api?module=account&action=txlist&address=${address}&page=1&offset=1&sort=desc`);
        const txDescData = await txDescRes.json();

        let txCount = 0;
        let firstTxDate = 'N/A';
        let lastTxDate = 'N/A';

        if (txAscData.status === "1" && txAscData.result.length > 0) {
          txCount = txAscData.result.length;  // approx recent
          const firstTs = parseInt(txAscData.result[0].timeStamp) * 1000;
          firstTxDate = new Date(firstTs).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
        }

        if (txDescData.status === "1" && txDescData.result.length > 0) {
          const lastTs = parseInt(txDescData.result[0].timeStamp) * 1000;
          lastTxDate = new Date(lastTs).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
        }

        // Approx higher tx wallets
        let higherWallets = '';
        if (txCount >= 150) higherWallets = 'Under 2,000 wallets have more tx than you 🔥';
        else if (txCount >= 80) higherWallets = 'Under 8,000 wallets have more tx than you';
        else if (txCount >= 30) higherWallets = 'Under 30,000 wallets have more tx than you';
        else if (txCount >= 10) higherWallets = 'Under 80,000 wallets have more tx than you';
        else higherWallets = 'Over 300,000 wallets have more tx than you 📉';

        const explorerLink = `https://testnet.arcscan.app/address/${address}`;

        resultDiv.innerHTML = `
          <div class="big-num">Tx Count: ${txCount}</div>
          <div class="rank">${higherWallets}</div>
          <br>
          <div>Balance: ${balance}</div>
          <div class="date">First Tx: ${firstTxDate}</div>
          <div class="date">Last Tx: ${lastTxDate}</div>
          <br>
          <small style="color:#00ff9d;">Your wallet is active compared to most!</small><br><br>
          <a href="${explorerLink}" target="_blank">View Full Details on Explorer →</a><br><br>
          <span class="note">Tx count max 10k recent se. Balance in ETH (Arc base). Dates in IST. Grind more to climb higher! 🚀</span>
        `;
      } catch (e) {
        resultDiv.innerHTML = `<span style="color: #ff5555;">Error: ${e.message || 'Fetch nahi ho paya. Internet ya address check kar.'}</span>`;
      }
    }
    </script>
</body>
</html>
