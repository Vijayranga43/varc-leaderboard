<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc Testnet Leaderboard 🔥</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { font-family: system-ui; } </style>
</head>
<body class="bg-gray-950 text-white p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-2">Arc Testnet Leaderboard 🔥</h1>
    <p class="text-center text-gray-400 mb-8">Most Active Wallets by Transaction Count</p>

    <!-- SEARCH BAR -->
    <div class="bg-gray-900 p-6 rounded-2xl mb-10">
      <p class="text-lg mb-3">Apna Wallet Check Karo</p>
      <div class="flex gap-3">
        <input id="walletInput" 
               type="text" 
               placeholder="0x3600000000000000000000000000000000000000" 
               class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-5 py-3 text-white focus:outline-none focus:border-blue-500">
        <button onclick="checkWallet()" 
                class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-xl font-semibold">
          Check Rank & Tx
        </button>
      </div>
      <div id="result" class="mt-6 text-lg font-medium"></div>
    </div>

    <!-- TOP 10 TABLE -->
    <h2 class="text-2xl mb-4">Top 10 Most Active Wallets</h2>
    <div class="overflow-x-auto">
      <table class="w-full border-collapse">
        <thead>
          <tr class="bg-gray-900">
            <th class="p-4 text-left">Rank</th>
            <th class="p-4 text-left">Wallet Address</th>
            <th class="p-4 text-right">Tx Count</th>
          </tr>
        </thead>
        <tbody id="leaderboard" class="text-gray-300">
          <!-- JS se fill hoga -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Top 10 data (latest from your site)
    const top10 = [
      { rank: 1, wallet: "0x360000...000000", tx: 10 },
      { rank: 2, wallet: "0xf3bf07...35b9d3", tx: 7 },
      { rank: 3, wallet: "0xff5cb2...a6e8d1", tx: 5 },
      { rank: 4, wallet: "0x9324a5...beceee", tx: 5 },
      { rank: 5, wallet: "0xbab687...f15d80", tx: 4 },
      { rank: 6, wallet: "0x737422...141023", tx: 3 },
      { rank: 7, wallet: "0x96de58...b3a490", tx: 2 },
      { rank: 8, wallet: "0xa1d89b...74fa96", tx: 1 },
      { rank: 9, wallet: "0x89b508...19d72a", tx: 1 },
      { rank: 10, wallet: "0x3d9463...e3d2ca", tx: 1 }
    ];

    // Table fill karo
    function renderTable() {
      const tbody = document.getElementById('leaderboard');
      tbody.innerHTML = '';
      top10.forEach(item => {
        const row = `<tr class="border-t border-gray-800 hover:bg-gray-900">
          <td class="p-4 font-bold">#${item.rank}</td>
          <td class="p-4 font-mono">${item.wallet}</td>
          <td class="p-4 text-right font-bold">${item.tx}</td>
        </tr>`;
        tbody.innerHTML += row;
      });
    }

    // Wallet search
    async function checkWallet() {
      const input = document.getElementById('walletInput').value.trim();
      const resultDiv = document.getElementById('result');
      
      if (!input || !input.startsWith('0x')) {
        resultDiv.innerHTML = `<span class="text-red-500">❌ Valid 0x address daalo</span>`;
        return;
      }

      resultDiv.innerHTML = `<span class="text-yellow-500">⏳ Checking on Arc Testnet...</span>`;

      try {
        const res = await fetch(`https://testnet.arcscan.app/api/v2/addresses/${input}`);
        const data = await res.json();
        const txCount = data.tx_count || 0;

        // Rank check (top 10 mein hai ya nahi)
        let rankText = "Not in top 10";
        // Note: table mein truncated hai, isliye exact match nahi, lekin tx count toh accurate hai

        resultDiv.innerHTML = `
          <div class="bg-green-900 border border-green-600 rounded-xl p-5">
            <p class="text-green-400">✅ Your Transaction Count: <span class="font-bold text-2xl">${txCount}</span></p>
            <p class="mt-3">Rank: <span class="font-bold">${rankText}</span></p>
            <p class="text-sm text-gray-400 mt-2">Top 10 table mein check karo agar high tx hai toh!</p>
          </div>
        `;
      } catch (err) {
        resultDiv.innerHTML = `<span class="text-red-500">❌ Error: Address sahi hai? Ya thoda wait karo.</span>`;
      }
    }

    // Page load pe table dikhao
    renderTable();
  </script>
</body>
</html>
