<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VARC Early Wallet Checker</title>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #00ff9d; font-size: 28px; margin-bottom: 10px; }
        .card { background: #111; padding: 30px; border-radius: 16px; margin: 20px 0; border: 1px solid #00ff9d; }
        input { width: 90%; padding: 18px; font-size: 17px; background: #222; color: white; border: 2px solid #00ff9d; border-radius: 12px; margin: 15px 0; }
        button { padding: 16px 40px; background: #00ff9d; color: black; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 25px; padding: 20px; background: #1a1a1a; border-radius: 12px; font-size: 20px; line-height: 1.6; }
        .big-num { font-size: 42px; color: #00ff9d; font-weight: bold; }
        .rank { font-size: 18px; color: #ffcc00; }
        .note { font-size: 14px; color: #888; margin-top: 15px; }
        a { color: #00ff9d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 VARC Early Wallet Checker</h1>
        <p style="color:#00ff9d;">Arc Testnet • Real Tx Count + Rank</p>

        <div class="card">
            <input type="text" id="walletInput" placeholder="0xYourWalletAddress... (42 characters)">
            <br>
            <button onclick="checkWallet()">Check Tx Count & Rank</button>
        </div>

        <div id="result"></div>

        <p class="note">Made by @vijayranga43 • Data from Arc Testnet Explorer</p>
    </div>

    <script>
    async function checkWallet() {
      const address = document.getElementById('walletInput').value.trim();
      const resultDiv = document.getElementById('result');
      
      if (!address || !address.startsWith('0x') || address.length !== 42) {
        resultDiv.innerHTML = '<span style="color: #ff5555;">Galat address! 0x se shuru aur exactly 42 characters daal.</span>';
        return;
      }

      resultDiv.innerHTML = 'Fetching real data from Arc Testnet... ⏳';

      try {
        const apiUrl = `https://testnet.arcscan.app/api?module=account&action=txlist&address=${address}&page=1&offset=10000`;
        const res = await fetch(apiUrl);
        const data = await res.json();
        
        if (data.status !== "1") throw new Error("API error");
        
        const txList = data.result || [];
        const txCount = txList.length;

        // Approx "kitne logo ne zyada tx kiye" (19M+ wallets ke hisaab se realistic estimate)
        let higherWallets = '';
        if (txCount >= 150) higherWallets = 'Under 2,000 wallets have more tx than you 🔥';
        else if (txCount >= 80) higherWallets = 'Under 8,000 wallets have more tx than you';
        else if (txCount >= 30) higherWallets = 'Under 30,000 wallets have more tx than you';
        else if (txCount >= 10) higherWallets = 'Under 80,000 wallets have more tx than you';
        else higherWallets = 'Over 300,000 wallets have more tx than you 📉';

        const explorerLink = `https://testnet.arcscan.app/address/${address}`;

        resultDiv.innerHTML = `
          <div class="big-num">Tx Count: ${txCount}</div>
          <div class="rank">${higherWallets}</div>
          <br>
          <small style="color:#00ff9d;">Your approx rank is better than most wallets!</small><br><br>
          <a href="${explorerLink}" target="_blank">View Full History on Explorer →</a><br><br>
          <span class="note">Note: Yeh max 10,000 recent tx se count hai. Global exact sabhi wallets ka comparison backend se aayega jaldi. Grind more tx to beat more wallets! 🚀</span>
        `;
      } catch (e) {
        resultDiv.innerHTML = `<span style="color: #ff5555;">Error: ${e.message || 'Internet check kar ya thodi der baad try kar.'}</span>`;
      }
    }
    </script>
</body>
</html>
